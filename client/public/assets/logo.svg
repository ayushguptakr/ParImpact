<svg width="320" height="120" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Icon -->
  <g transform="translate(20,10)">
    <!-- Circle / impact ring -->
    <ellipse cx="40" cy="50" rx="35" ry="12" fill="url(#greenGradient)" opacity="0.9"></ellipse>
    
    <!-- Flag pole -->
    <line x1="40" y1="20" x2="40" y2="50" stroke="#6EE7B7" stroke-width="3" stroke-linecap="round"></line>
    
    <!-- Flag -->
    <path d="M40 20 Q55 18 60 25 Q50 30 40 28 Z" fill="#4ADE80"></path>
    
    <!-- Spark (impact) -->
    <circle cx="25" cy="30" r="2" fill="#86EFAC"></circle>
    <circle cx="20" cy="35" r="1.5" fill="#86EFAC"></circle>
  </g>

  <!-- Text -->
  <text x="90" y="60" font-family="Inter, sans-serif" font-size="32" font-weight="600">
    <tspan fill="#4ADE80">Par</tspan>
    <tspan fill="#E5E7EB">Impact</tspan>
  </text>

  <!-- Tagline -->
  <text x="90" y="85" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF">
    Play with Purpose
  </text>

  <!-- Gradient -->
  <defs>
    <linearGradient id="greenGradient" x1="0" y1="0" x2="80" y2="0">
      <stop offset="0%" stop-color="#166534"></stop>
      <stop offset="100%" stop-color="#22C55E"></stop>
    </linearGradient>
  </defs>
</svg>