<svg width="280" height="80" viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Icon -->
  <g transform="translate(10,10)">
    <!-- Smooth impact ring -->
    <ellipse cx="30" cy="40" rx="26" ry="9" stroke="url(#ring)" stroke-width="2" opacity="0.8"></ellipse>
    
    <!-- Flag pole -->
    <line x1="30" y1="15" x2="30" y2="40" stroke="#86EFAC" stroke-width="2" stroke-linecap="round"></line>
    
    <!-- Flag (clean minimal shape) -->
    <path d="M30 15 Q42 13 46 20 Q38 24 30 22 Z" fill="#4ADE80"></path>
  </g>

  <!-- Brand Text -->
  <text x="80" y="42" font-family="Inter, sans-serif" font-size="26" font-weight="600">
    <tspan fill="#4ADE80">Par</tspan>
    <tspan fill="#E5E7EB">Impact</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="62" font-family="Inter, sans-serif" font-size="12" fill="#9CA3AF">
    Play with Purpose
  </text>

  <!-- Gradient -->
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="60" y2="0">
      <stop offset="0%" stop-color="#14532D"></stop>
      <stop offset="100%" stop-color="#22C55E"></stop>
    </linearGradient>
  </defs>
</svg>